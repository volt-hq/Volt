name: Bug Report
description: Report something that's broken
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Before you start:** Read CONTRIBUTING.md.

        Keep this short. If it doesn't fit on one screen, it's too long. Write in your own voice.

        **Important:** before reporting an issue in core, please validate first with `volt -ne` that this is not caused by an extension you loaded.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Be specific. Include error messages if any.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Version
      description: e.g. 0.49.0
    validations:
      required: false
