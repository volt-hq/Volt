name: Build Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v0.12.0)'
        required: true
        type: string

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Validate release tag input
        shell: bash
        run: |
          if [[ ! "${RELEASE_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Release tag must be canonical vMAJOR.MINOR.PATCH: ${RELEASE_TAG}" >&2
            exit 1
          fi
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" != "refs/tags/${RELEASE_TAG}" ]]; then
            echo "Push event ref does not match release tag" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Verify tag, source commit, versions, and release guardrails
        run: |
          node scripts/verify-release-provenance.mjs --tag "${RELEASE_TAG}"
          node --test scripts/release-security.test.mjs

      - name: Verify npm package bootstrap
        run: node scripts/verify-npm-package-bootstrap.mjs

      - name: Build binaries
        run: ./scripts/build-binaries.sh

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${RELEASE_TAG}"
          VERSION="${VERSION#v}"  # Remove 'v' prefix
          node scripts/release-notes.mjs extract --version "${VERSION}" --tag "${RELEASE_TAG}" --out /tmp/release-notes.md

      - name: Create GitHub Release and upload binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd packages/coding-agent/binaries

          release_assets=(
            volt-darwin-arm64.tar.gz
            volt-darwin-x64.tar.gz
            volt-linux-x64.tar.gz
            volt-linux-arm64.tar.gz
            volt-windows-x64.zip
            volt-windows-arm64.zip
          )
          LC_ALL=C sha256sum "${release_assets[@]}" > SHA256SUMS
          release_assets+=(SHA256SUMS)

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --notes-file /tmp/release-notes.md
          else
            source_commit=$(git rev-parse HEAD)
            gh release create "${RELEASE_TAG}" \
              --verify-tag \
              --target "${source_commit}" \
              --title "${RELEASE_TAG}" \
              --notes-file /tmp/release-notes.md
          fi

          existing_assets=$(gh release view "${RELEASE_TAG}" --json assets --jq '.assets[].name')
          compare_dir=$(mktemp -d)
          trap 'rm -rf "${compare_dir}"' EXIT
          for asset in "${release_assets[@]}"; do
            if grep -Fxq -- "${asset}" <<<"${existing_assets}"; then
              rm -f "${compare_dir}/${asset}"
              gh release download "${RELEASE_TAG}" --pattern "${asset}" --dir "${compare_dir}"
              if ! cmp -s "${asset}" "${compare_dir}/${asset}"; then
                echo "Refusing to replace existing release asset with different bytes: ${asset}" >&2
                exit 1
              fi
              echo "Existing release asset is identical; keeping it: ${asset}"
            else
              gh release upload "${RELEASE_TAG}" "${asset}"
            fi
          done

  publish-npm:
    runs-on: ubuntu-latest
    needs: build
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Validate release tag input
        shell: bash
        run: |
          if [[ ! "${RELEASE_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Release tag must be canonical vMAJOR.MINOR.PATCH: ${RELEASE_TAG}" >&2
            exit 1
          fi
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" != "refs/tags/${RELEASE_TAG}" ]]; then
            echo "Push event ref does not match release tag" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Verify tag, source commit, versions, and release guardrails
        run: |
          node scripts/verify-release-provenance.mjs --tag "${RELEASE_TAG}"
          node --test scripts/release-security.test.mjs

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -s $(which fdfind) /usr/local/bin/fd

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Check
        run: npm run check

      - name: Test
        run: npm test

      - name: Verify release artifacts are committed
        run: git diff --exit-code

      - name: Upgrade npm for trusted publishing
        run: |
          npm install -g npm@11.16.0 --ignore-scripts
          npm --version

      - name: Publish npm packages
        run: node scripts/publish.mjs
