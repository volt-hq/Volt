name: Publish Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v0.1.0)'
        required: true
        type: string

permissions: {}

jobs:
  validate:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Validate release tag input
        shell: bash
        run: |
          if [[ ! "${RELEASE_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Release tag must be canonical vMAJOR.MINOR.PATCH: ${RELEASE_TAG}" >&2
            exit 1
          fi
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" != "refs/tags/${RELEASE_TAG}" ]]; then
            echo "Push event ref does not match release tag" >&2
            exit 1
          fi

      - name: Checkout immutable release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.23.1'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Verify tag, source commit, and versions
        run: node scripts/verify-release-provenance.mjs --tag "${RELEASE_TAG}"

      - name: Verify npm package bootstrap
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"
          node scripts/verify-npm-package-bootstrap.mjs tag --version "${VERSION}"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check release security and build guardrails
        run: npm run check:release-security

  assemble:
    runs-on: ubuntu-24.04
    needs: validate
    permissions:
      actions: read
      contents: read
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout immutable release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.23.1'
          package-manager-cache: false

      - name: Resolve and verify the explicitly approved candidate run
        id: candidate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          source_commit=$(git rev-parse HEAD)
          if [[ "$(git cat-file -t "${RELEASE_TAG}")" != "tag" ]]; then
            echo "Release tag must be annotated with the approved standalone candidate" >&2
            exit 1
          fi
          tag_message=$(git for-each-ref --format='%(contents)' "refs/tags/${RELEASE_TAG}")
          mapfile -t candidate_commits < <(printf '%s\n' "${tag_message}" | sed -n 's/^Standalone-Candidate-Commit: //p')
          mapfile -t candidate_run_ids < <(printf '%s\n' "${tag_message}" | sed -n 's/^Standalone-Candidate-Run: //p')
          if [[ "${#candidate_commits[@]}" != "1" ]] || [[ ! "${candidate_commits[0]}" =~ ^[0-9a-f]{40}$ ]] || \
             [[ "${candidate_commits[0]}" != "${source_commit}" ]]; then
            echo "Release tag candidate commit is missing, malformed, or does not match ${source_commit}" >&2
            exit 1
          fi
          if [[ "${#candidate_run_ids[@]}" != "1" ]]; then
            echo "Release tag must identify exactly one approved candidate workflow run" >&2
            exit 1
          fi
          candidate_run_id=${candidate_run_ids[0]}
          if [[ ! "${candidate_run_id}" =~ ^[0-9]+$ ]]; then
            echo "Approved candidate workflow run ID is malformed" >&2
            exit 1
          fi
          IFS=$'\t' read -r run_id head_sha head_branch event status conclusion workflow_path < <(
            gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${candidate_run_id}" \
              --jq '[.id, .head_sha, .head_branch, .event, .status, .conclusion, .path] | @tsv'
          )
          if [[ "${run_id}" != "${candidate_run_id}" ]] || [[ "${head_sha}" != "${source_commit}" ]] || \
             [[ "${head_branch}" != "main" ]] || [[ "${event}" != "workflow_dispatch" ]] || \
             [[ "${status}" != "completed" ]] || [[ "${conclusion}" != "success" ]] || \
             [[ "${workflow_path}" != ".github/workflows/build-standalone-candidate.yml" ]]; then
            echo "Approved run is not a successful exact-commit Build Standalone Candidate run on main" >&2
            exit 1
          fi
          printf 'run-id=%s\n' "${candidate_run_id}" >> "${GITHUB_OUTPUT}"
          printf 'source-commit=%s\n' "${source_commit}" >> "${GITHUB_OUTPUT}"

      - name: Download the inspected standalone candidate bytes
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: standalone-candidate-${{ steps.candidate.outputs.source-commit }}
          path: release-artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.candidate.outputs.run-id }}

      - name: Reverify the inspected candidate bytes and exact release set
        shell: bash
        run: |
          release_assets=(
            volt-darwin-arm64.tar.gz
            volt-darwin-x64.tar.gz
            volt-linux-arm64.tar.gz
            volt-linux-x64.tar.gz
            volt-windows-arm64.zip
            volt-windows-x64.zip
          )
          cd release-artifacts
          source_commit=$(tr -d '\r\n' < source-commit.txt)
          if [[ "${source_commit}" != "${{ steps.candidate.outputs.source-commit }}" ]]; then
            echo "Candidate artifact commit ${source_commit} does not match tag commit ${{ steps.candidate.outputs.source-commit }}" >&2
            exit 1
          fi
          for asset in "${release_assets[@]}"; do
            if [[ ! -f "${asset}" ]]; then
              echo "Missing standalone archive: ${asset}" >&2
              exit 1
            fi
          done
          if [[ "$(find . -maxdepth 1 -type f -name 'volt-*' | wc -l | tr -d ' ')" != "6" ]]; then
            echo "Unexpected standalone archive set" >&2
            exit 1
          fi
          if [[ "$(find . -mindepth 1 -maxdepth 1 -type f | wc -l | tr -d ' ')" != "8" ]] || \
             [[ -n "$(find . -mindepth 1 -maxdepth 1 ! -type f -print -quit)" ]]; then
            echo "Candidate artifact contains an unexpected top-level entry" >&2
            exit 1
          fi
          if [[ "$(wc -l < SHA256SUMS | tr -d ' ')" != "6" ]]; then
            echo "Candidate SHA256SUMS must contain exactly six entries" >&2
            exit 1
          fi
          for asset in "${release_assets[@]}"; do
            if [[ "$(awk -v asset="${asset}" '$2 == asset { count += 1 } END { print count + 0 }' SHA256SUMS)" != "1" ]]; then
              echo "Candidate SHA256SUMS must contain exactly one entry for ${asset}" >&2
              exit 1
            fi
          done
          awk 'length($1) != 64 || $1 !~ /^[0-9A-Fa-f]+$/ { exit 1 }' SHA256SUMS
          sha256sum --strict -c SHA256SUMS

      - name: Extract release notes
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"
          node scripts/release-notes.mjs extract --version "${VERSION}" --tag "${RELEASE_TAG}" --out release-artifacts/release-notes.md

      - name: Upload verified release artifacts for publication
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ env.RELEASE_TAG }}
          path: |
            release-artifacts/volt-darwin-arm64.tar.gz
            release-artifacts/volt-darwin-x64.tar.gz
            release-artifacts/volt-linux-arm64.tar.gz
            release-artifacts/volt-linux-x64.tar.gz
            release-artifacts/volt-windows-arm64.zip
            release-artifacts/volt-windows-x64.zip
            release-artifacts/SHA256SUMS
            release-artifacts/release-notes.md
            release-artifacts/source-commit.txt
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

  publish-npm:
    runs-on: ubuntu-24.04
    needs: assemble
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Validate release tag input
        shell: bash
        run: |
          if [[ ! "${RELEASE_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Release tag must be canonical vMAJOR.MINOR.PATCH: ${RELEASE_TAG}" >&2
            exit 1
          fi
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" != "refs/tags/${RELEASE_TAG}" ]]; then
            echo "Push event ref does not match release tag" >&2
            exit 1
          fi

      - name: Checkout immutable release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.23.1'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Verify tag, source commit, and versions
        run: node scripts/verify-release-provenance.mjs --tag "${RELEASE_TAG}"

      - name: Install system dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -s "$(which fdfind)" /usr/local/bin/fd

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Check
        run: npm run check

      - name: Test
        shell: bash
        run: |
          mkdir -p /tmp/ws
          recovery_fixture=''
          restore_recovery_fixture() {
            if [[ -n "${recovery_fixture}" ]]; then
              git restore --source=HEAD --worktree -- "${recovery_fixture}"
            fi
          }
          trap restore_recovery_fixture EXIT
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${RELEASE_TAG}" == "v0.1.0" ]]; then
            recovery_commit='7c6cd97f8069e371a35ea8369b5b3aa525a0b107'
            recovery_fixture='packages/coding-agent/test/rpc-client-process-exit.test.ts'
            git cat-file -e "${recovery_commit}^{commit}"
            git show "${recovery_commit}:${recovery_fixture}" > "${recovery_fixture}"
          fi
          if npm test; then
            echo "Tests passed on the first attempt."
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "Tests failed on the first attempt; retrying once for this manual release recovery."
            npm test
          else
            echo "Tests failed; automatic tag releases are not retried." >&2
            exit 1
          fi
          restore_recovery_fixture
          trap - EXIT

      - name: Verify release artifacts are committed
        run: git diff --exit-code HEAD

      - name: Upgrade npm for trusted publishing
        run: |
          npm install -g npm@11.16.0 --ignore-scripts
          npm --version

      - name: Publish npm packages
        run: node scripts/publish.mjs

      - name: Verify published beta channel
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"
          node scripts/verify-npm-package-bootstrap.mjs tag --version "${VERSION}"

  release:
    runs-on: ubuntu-24.04
    needs: [assemble, publish-npm]
    environment: binary-release
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Validate release tag input
        shell: bash
        run: |
          if [[ ! "${RELEASE_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Release tag must be canonical vMAJOR.MINOR.PATCH: ${RELEASE_TAG}" >&2
            exit 1
          fi
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" != "refs/tags/${RELEASE_TAG}" ]]; then
            echo "Push event ref does not match release tag" >&2
            exit 1
          fi

      - name: Checkout immutable release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Reverify release provenance after npm publication
        run: node scripts/verify-release-provenance.mjs --tag "${RELEASE_TAG}"

      - name: Download verified release artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: release-${{ env.RELEASE_TAG }}
          path: release-artifacts

      - name: Create GitHub Release and upload exact binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          cd release-artifacts

          release_assets=(
            volt-darwin-arm64.tar.gz
            volt-darwin-x64.tar.gz
            volt-linux-arm64.tar.gz
            volt-linux-x64.tar.gz
            volt-windows-arm64.zip
            volt-windows-x64.zip
            SHA256SUMS
          )
          sha256sum -c SHA256SUMS

          source_commit=$(tr -d '\r\n' < source-commit.txt)
          checkout_commit=$(git rev-parse HEAD)
          if [[ "${source_commit}" != "${checkout_commit}" ]]; then
            echo "Release artifact commit ${source_commit} does not match checked-out tag commit ${checkout_commit}" >&2
            exit 1
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --notes-file release-notes.md
          else
            gh release create "${RELEASE_TAG}" \
              --verify-tag \
              --target "${source_commit}" \
              --title "${RELEASE_TAG}" \
              --notes-file release-notes.md
          fi

          existing_assets=$(gh release view "${RELEASE_TAG}" --json assets --jq '.assets[].name')
          compare_dir=$(mktemp -d)
          trap 'rm -rf "${compare_dir}"' EXIT
          for asset in "${release_assets[@]}"; do
            if grep -Fxq -- "${asset}" <<<"${existing_assets}"; then
              rm -f "${compare_dir}/${asset}"
              gh release download "${RELEASE_TAG}" --pattern "${asset}" --dir "${compare_dir}"
              if ! cmp -s "${asset}" "${compare_dir}/${asset}"; then
                echo "Refusing to replace existing release asset with different bytes: ${asset}" >&2
                exit 1
              fi
              echo "Existing release asset is identical; keeping it: ${asset}"
            else
              gh release upload "${RELEASE_TAG}" "${asset}"
            fi
          done
