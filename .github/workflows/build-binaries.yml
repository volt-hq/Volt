name: Publish Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Canonical release tag to publish (for example, v0.2.0)'
        required: true
        type: string

permissions: {}

concurrency:
  group: publish-release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ inputs.tag }}
    steps:
      - name: Validate tag-scoped dispatch
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]]; then
            echo "Publish Release only accepts an explicit workflow dispatch" >&2
            exit 1
          fi
          if [[ ! "${RELEASE_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Release tag must be canonical vMAJOR.MINOR.PATCH: ${RELEASE_TAG}" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF}" != "refs/tags/${RELEASE_TAG}" ]]; then
            echo "Workflow must be dispatched with ref ${RELEASE_TAG}; got ${GITHUB_REF}" >&2
            exit 1
          fi

      - name: Checkout immutable release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify dispatch and checkout resolve to the tag commit
        shell: bash
        run: |
          if [[ "$(git cat-file -t "refs/tags/${RELEASE_TAG}")" != "tag" ]]; then
            echo "Release tag must be annotated: ${RELEASE_TAG}" >&2
            exit 1
          fi
          tag_commit=$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}")
          checkout_commit=$(git rev-parse HEAD)
          if [[ "${GITHUB_SHA}" != "${tag_commit}" ]] || [[ "${checkout_commit}" != "${tag_commit}" ]]; then
            echo "Dispatch SHA and checkout must both resolve to ${RELEASE_TAG}'s commit" >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.23.1'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Verify tag, source commit, and versions
        run: node scripts/verify-release-provenance.mjs --tag "${RELEASE_TAG}"

      - name: Verify npm package bootstrap
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"
          node scripts/verify-npm-package-bootstrap.mjs tag --version "${VERSION}"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check release security and build guardrails
        run: npm run check:release-security

  assemble:
    runs-on: ubuntu-24.04
    needs: validate
    permissions:
      actions: read
      attestations: read
      contents: read
    env:
      RELEASE_TAG: ${{ inputs.tag }}
    steps:
      - name: Validate tag-scoped dispatch
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]] || \
             [[ ! "${RELEASE_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]] || \
             [[ "${GITHUB_REF}" != "refs/tags/${RELEASE_TAG}" ]]; then
            echo "Publisher must be explicitly dispatched at the canonical tag ${RELEASE_TAG}" >&2
            exit 1
          fi

      - name: Checkout immutable release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify dispatch and checkout resolve to the tag commit
        shell: bash
        run: |
          if [[ "$(git cat-file -t "refs/tags/${RELEASE_TAG}")" != "tag" ]]; then
            echo "Release tag must be annotated: ${RELEASE_TAG}" >&2
            exit 1
          fi
          tag_commit=$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}")
          checkout_commit=$(git rev-parse HEAD)
          if [[ "${GITHUB_SHA}" != "${tag_commit}" ]] || [[ "${checkout_commit}" != "${tag_commit}" ]]; then
            echo "Dispatch SHA and checkout must both resolve to ${RELEASE_TAG}'s commit" >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.23.1'
          package-manager-cache: false

      - name: Resolve exact approved candidate and artifact
        id: candidate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          source_commit=$(git rev-parse HEAD)
          tag_message=$(git for-each-ref --format='%(contents)' "refs/tags/${RELEASE_TAG}")
          mapfile -t candidate_commits < <(printf '%s\n' "${tag_message}" | sed -n 's/^Standalone-Candidate-Commit: //p')
          mapfile -t candidate_run_ids < <(printf '%s\n' "${tag_message}" | sed -n 's/^Standalone-Candidate-Run: //p')
          mapfile -t candidate_digests < <(printf '%s\n' "${tag_message}" | sed -n 's/^Standalone-Candidate-Artifact-Digest: //p')
          mapfile -t approval_run_ids < <(printf '%s\n' "${tag_message}" | sed -n 's/^Release-Approval-Run: //p')

          if [[ "${#candidate_commits[@]}" != "1" ]] || \
             [[ ! "${candidate_commits[0]}" =~ ^[0-9a-f]{40}$ ]] || \
             [[ "${candidate_commits[0]}" != "${source_commit}" ]]; then
            echo "Release tag candidate commit is missing, malformed, or does not match ${source_commit}" >&2
            exit 1
          fi
          if [[ "${#candidate_run_ids[@]}" != "1" ]] || [[ ! "${candidate_run_ids[0]}" =~ ^[1-9][0-9]*$ ]]; then
            echo "Release tag must identify exactly one positive candidate workflow run ID" >&2
            exit 1
          fi

          if [[ "${RELEASE_TAG}" == "v0.1.0" ]]; then
            if [[ "${#candidate_digests[@]}" != "0" ]] || [[ "${#approval_run_ids[@]}" != "0" ]]; then
              echo "Legacy v0.1.0 must retain its original immutable authorization message" >&2
              exit 1
            fi
          else
            if [[ "${#candidate_digests[@]}" != "1" ]] || \
               [[ ! "${candidate_digests[0]}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "Release tag must identify exactly one canonical candidate artifact digest" >&2
              exit 1
            fi
            if [[ "${#approval_run_ids[@]}" != "1" ]] || [[ ! "${approval_run_ids[0]}" =~ ^[1-9][0-9]*$ ]]; then
              echo "Release tag must identify exactly one positive release approval run ID" >&2
              exit 1
            fi
          fi

          candidate_run_id=${candidate_run_ids[0]}
          IFS=$'\t' read -r run_id head_sha head_branch event status conclusion workflow_path < <(
            gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${candidate_run_id}" \
              --jq '[.id, .head_sha, .head_branch, .event, .status, .conclusion, .path] | @tsv'
          )
          if [[ "${run_id}" != "${candidate_run_id}" ]] || [[ "${head_sha}" != "${source_commit}" ]] || \
             [[ "${head_branch}" != "main" ]] || [[ "${event}" != "workflow_dispatch" ]] || \
             [[ "${status}" != "completed" ]] || [[ "${conclusion}" != "success" ]] || \
             [[ "${workflow_path}" != ".github/workflows/build-standalone-candidate.yml" ]]; then
            echo "Approved run is not a successful exact-commit Build Standalone Candidate run on main" >&2
            exit 1
          fi

          artifact_name="standalone-candidate-${source_commit}"
          artifact_json=$(
            gh api --method GET "/repos/${GITHUB_REPOSITORY}/actions/runs/${candidate_run_id}/artifacts" \
              -f per_page=100 \
              -f name="${artifact_name}" |
              jq --arg artifact_name "${artifact_name}" \
                '[.artifacts[] | select(.name == $artifact_name and .expired == false)]'
          )
          if [[ "$(jq 'length' <<<"${artifact_json}")" != "1" ]]; then
            echo "Approved run must contain exactly one unexpired ${artifact_name} artifact" >&2
            exit 1
          fi
          api_digest=$(jq -r '.[0].digest' <<<"${artifact_json}")
          artifact_id=$(jq -r '.[0].id' <<<"${artifact_json}")
          if [[ ! "${api_digest}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Candidate artifact API digest is missing or malformed" >&2
            exit 1
          fi
          if [[ ! "${artifact_id}" =~ ^[1-9][0-9]*$ ]]; then
            echo "Candidate artifact API ID is missing or malformed" >&2
            exit 1
          fi
          if [[ "${RELEASE_TAG}" != "v0.1.0" ]] && [[ "${candidate_digests[0]}" != "${api_digest}" ]]; then
            echo "Candidate artifact API digest does not match the approved tag digest" >&2
            exit 1
          fi

          if [[ "${RELEASE_TAG}" != "v0.1.0" ]]; then
            approval_run_id=${approval_run_ids[0]}
            IFS=$'\t' read -r approval_id approval_sha approval_branch approval_event approval_path < <(
              gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${approval_run_id}" \
                --jq '[.id, .head_sha, .head_branch, .event, .path] | @tsv'
            )
            if [[ "${approval_id}" != "${approval_run_id}" ]] || [[ "${approval_sha}" != "${source_commit}" ]] || \
               [[ "${approval_branch}" != "main" ]] || [[ "${approval_event}" != "workflow_dispatch" ]] || \
               [[ "${approval_path}" != ".github/workflows/approve-release.yml" ]]; then
              echo "Release approval run does not match this exact candidate and approval workflow" >&2
              exit 1
            fi
          fi

          printf 'run-id=%s\n' "${candidate_run_id}" >> "${GITHUB_OUTPUT}"
          printf 'source-commit=%s\n' "${source_commit}" >> "${GITHUB_OUTPUT}"
          printf 'artifact-id=%s\n' "${artifact_id}" >> "${GITHUB_OUTPUT}"
          printf 'artifact-digest=%s\n' "${api_digest}" >> "${GITHUB_OUTPUT}"

      - name: Download the inspected standalone candidate bytes
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          artifact-ids: ${{ steps.candidate.outputs.artifact-id }}
          path: release-artifacts
          merge-multiple: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.candidate.outputs.run-id }}

      - name: Reverify candidate bytes and release record
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          release_assets=(
            volt-darwin-arm64.tar.gz
            volt-darwin-x64.tar.gz
            volt-linux-arm64.tar.gz
            volt-linux-x64.tar.gz
            volt-windows-arm64.zip
            volt-windows-x64.zip
          )
          cd release-artifacts

          if [[ "$(find . -mindepth 1 -maxdepth 1 -type f | wc -l | tr -d ' ')" != "9" ]] || \
             [[ -n "$(find . -mindepth 1 -maxdepth 1 ! -type f -print -quit)" ]]; then
            echo "Candidate artifact must contain exactly nine top-level files" >&2
            exit 1
          fi
          for required_file in "${release_assets[@]}" SHA256SUMS source-commit.txt release-record.json; do
            if [[ ! -f "${required_file}" ]]; then
              echo "Candidate artifact is missing ${required_file}" >&2
              exit 1
            fi
          done
          if [[ "$(find . -maxdepth 1 -type f -name 'volt-*' | wc -l | tr -d ' ')" != "6" ]]; then
            echo "Unexpected standalone archive set" >&2
            exit 1
          fi

          source_commit=$(tr -d '\r\n' < source-commit.txt)
          if [[ "${source_commit}" != "${{ steps.candidate.outputs.source-commit }}" ]]; then
            echo "Candidate artifact commit ${source_commit} does not match tag commit ${{ steps.candidate.outputs.source-commit }}" >&2
            exit 1
          fi
          if [[ "$(wc -l < SHA256SUMS | tr -d ' ')" != "6" ]]; then
            echo "Candidate SHA256SUMS must contain exactly six entries" >&2
            exit 1
          fi
          if ! awk 'NF != 2 || length($1) != 64 || $1 !~ /^[0-9a-f]+$/ { exit 1 }' SHA256SUMS; then
            echo "Candidate SHA256SUMS contains a malformed entry" >&2
            exit 1
          fi
          for asset in "${release_assets[@]}"; do
            if [[ "$(awk -v asset="${asset}" '$2 == asset { count += 1 } END { print count + 0 }' SHA256SUMS)" != "1" ]]; then
              echo "Candidate SHA256SUMS must contain exactly one entry for ${asset}" >&2
              exit 1
            fi
          done
          sha256sum --strict -c SHA256SUMS

          jq -e \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg run_id "${{ steps.candidate.outputs.run-id }}" \
            --arg candidate_commit "${{ steps.candidate.outputs.source-commit }}" \
            --arg artifact_name "standalone-candidate-${{ steps.candidate.outputs.source-commit }}" \
            --arg run_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${{ steps.candidate.outputs.run-id }}" \
            '
              .schemaVersion == 1 and
              .repository == $repository and
              .workflow.name == "Build Standalone Candidate" and
              .workflow.path == ".github/workflows/build-standalone-candidate.yml" and
              .workflow.runId == $run_id and
              .workflow.url == $run_url and
              (.workflow.runAttempt | type == "string" and test("^[1-9][0-9]*$")) and
              .candidate.commit == $candidate_commit and
              .candidate.ref == "refs/heads/main" and
              .artifact.name == $artifact_name and
              .artifact.retentionDays == 30 and
              .runtime.name == "node" and
              .runtime.version == "22.23.1" and
              (.archives | type == "array" and length == 6)
            ' \
            release-record.json \
            > /dev/null

          for asset in "${release_assets[@]}"; do
            checksum=$(awk -v asset="${asset}" '$2 == asset { print $1 }' SHA256SUMS)
            record_checksum=$(
              jq -r --arg asset "${asset}" \
                '[.archives[] | select(.name == $asset) | .sha256] | if length == 1 then .[0] else empty end' \
                release-record.json
            )
            if [[ "${record_checksum}" != "${checksum}" ]]; then
              echo "Release record digest does not match SHA256SUMS for ${asset}" >&2
              exit 1
            fi
            gh attestation verify "${asset}" \
              --repo "${GITHUB_REPOSITORY}" \
              --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/build-standalone-candidate.yml" \
              --source-digest "${{ steps.candidate.outputs.source-commit }}" \
              --source-ref refs/heads/main \
              --deny-self-hosted-runners
          done
          gh attestation verify release-record.json \
            --repo "${GITHUB_REPOSITORY}" \
            --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/build-standalone-candidate.yml" \
            --source-digest "${{ steps.candidate.outputs.source-commit }}" \
            --source-ref refs/heads/main \
            --deny-self-hosted-runners

      - name: Extract release notes
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"
          node scripts/release-notes.mjs extract --version "${VERSION}" --tag "${RELEASE_TAG}" --out release-artifacts/release-notes.md

      - name: Upload verified release artifacts for publication
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ env.RELEASE_TAG }}
          path: |
            release-artifacts/volt-darwin-arm64.tar.gz
            release-artifacts/volt-darwin-x64.tar.gz
            release-artifacts/volt-linux-arm64.tar.gz
            release-artifacts/volt-linux-x64.tar.gz
            release-artifacts/volt-windows-arm64.zip
            release-artifacts/volt-windows-x64.zip
            release-artifacts/SHA256SUMS
            release-artifacts/release-record.json
            release-artifacts/release-notes.md
            release-artifacts/source-commit.txt
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

  publish-npm:
    runs-on: ubuntu-24.04
    needs: assemble
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ inputs.tag }}
    steps:
      - name: Validate tag-scoped dispatch
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]] || \
             [[ ! "${RELEASE_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]] || \
             [[ "${GITHUB_REF}" != "refs/tags/${RELEASE_TAG}" ]]; then
            echo "Publisher must be explicitly dispatched at the canonical tag ${RELEASE_TAG}" >&2
            exit 1
          fi

      - name: Checkout immutable release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify dispatch and checkout resolve to the tag commit
        shell: bash
        run: |
          if [[ "$(git cat-file -t "refs/tags/${RELEASE_TAG}")" != "tag" ]]; then
            echo "Release tag must be annotated: ${RELEASE_TAG}" >&2
            exit 1
          fi
          tag_commit=$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}")
          checkout_commit=$(git rev-parse HEAD)
          if [[ "${GITHUB_SHA}" != "${tag_commit}" ]] || [[ "${checkout_commit}" != "${tag_commit}" ]]; then
            echo "Dispatch SHA and checkout must both resolve to ${RELEASE_TAG}'s commit" >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.23.1'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Verify tag, source commit, and versions
        run: node scripts/verify-release-provenance.mjs --tag "${RELEASE_TAG}"

      - name: Install system dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -s "$(which fdfind)" /usr/local/bin/fd

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Check
        run: npm run check

      - name: Prepare test workspace
        run: mkdir -p /tmp/ws

      - name: Test
        run: npm test

      - name: Verify release artifacts are committed
        run: git diff --exit-code HEAD

      - name: Upgrade npm for trusted publishing
        run: |
          npm install -g npm@11.16.0 --ignore-scripts
          npm --version

      - name: Publish npm packages
        run: node scripts/publish.mjs

      - name: Verify publish left the checkout unchanged
        run: git diff --exit-code HEAD

      - name: Verify published beta channel
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"
          node scripts/verify-npm-package-bootstrap.mjs tag --version "${VERSION}"

  release:
    runs-on: ubuntu-24.04
    needs: [assemble, publish-npm]
    environment: binary-release
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ inputs.tag }}
    steps:
      - name: Validate tag-scoped dispatch
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]] || \
             [[ ! "${RELEASE_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]] || \
             [[ "${GITHUB_REF}" != "refs/tags/${RELEASE_TAG}" ]]; then
            echo "Publisher must be explicitly dispatched at the canonical tag ${RELEASE_TAG}" >&2
            exit 1
          fi

      - name: Checkout immutable release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify dispatch and checkout resolve to the tag commit
        shell: bash
        run: |
          if [[ "$(git cat-file -t "refs/tags/${RELEASE_TAG}")" != "tag" ]]; then
            echo "Release tag must be annotated: ${RELEASE_TAG}" >&2
            exit 1
          fi
          tag_commit=$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}")
          checkout_commit=$(git rev-parse HEAD)
          if [[ "${GITHUB_SHA}" != "${tag_commit}" ]] || [[ "${checkout_commit}" != "${tag_commit}" ]]; then
            echo "Dispatch SHA and checkout must both resolve to ${RELEASE_TAG}'s commit" >&2
            exit 1
          fi

      - name: Reverify release provenance after npm publication
        run: node scripts/verify-release-provenance.mjs --tag "${RELEASE_TAG}"

      - name: Download verified release artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: release-${{ env.RELEASE_TAG }}
          path: release-artifacts

      - name: Finalize pre-authorized GitHub prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          cd release-artifacts

          release_assets=(
            volt-darwin-arm64.tar.gz
            volt-darwin-x64.tar.gz
            volt-linux-arm64.tar.gz
            volt-linux-x64.tar.gz
            volt-windows-arm64.zip
            volt-windows-x64.zip
            SHA256SUMS
            release-record.json
          )
          internal_files=("${release_assets[@]}" release-notes.md source-commit.txt)
          if [[ "$(find . -mindepth 1 -maxdepth 1 -type f | wc -l | tr -d ' ')" != "10" ]] || \
             [[ -n "$(find . -mindepth 1 -maxdepth 1 ! -type f -print -quit)" ]]; then
            echo "Publication artifact must contain exactly ten top-level files" >&2
            exit 1
          fi
          for file in "${internal_files[@]}"; do
            if [[ ! -f "${file}" ]]; then
              echo "Publication artifact is missing ${file}" >&2
              exit 1
            fi
          done
          sha256sum --strict -c SHA256SUMS

          source_commit=$(tr -d '\r\n' < source-commit.txt)
          checkout_commit=$(git rev-parse HEAD)
          if [[ "${source_commit}" != "${checkout_commit}" ]]; then
            echo "Release artifact commit ${source_commit} does not match checked-out tag commit ${checkout_commit}" >&2
            exit 1
          fi

          if ! release_json=$(gh release view "${RELEASE_TAG}" --json assets,isDraft,isPrerelease,tagName); then
            echo "Release approval must create the draft prerelease before publication" >&2
            exit 1
          fi
          if [[ "$(jq -r '.tagName' <<<"${release_json}")" != "${RELEASE_TAG}" ]] || \
             [[ "$(jq -r '.isPrerelease' <<<"${release_json}")" != "true" ]]; then
            echo "Pre-authorized GitHub release must be a prerelease for ${RELEASE_TAG}" >&2
            exit 1
          fi
          is_draft=$(jq -r '.isDraft' <<<"${release_json}")
          if [[ "${is_draft}" != "true" ]] && [[ "${is_draft}" != "false" ]]; then
            echo "Unable to determine GitHub release publication state" >&2
            exit 1
          fi

          mapfile -t existing_assets < <(jq -r '.assets[].name' <<<"${release_json}")
          for existing_asset in "${existing_assets[@]}"; do
            expected=false
            for asset in "${release_assets[@]}"; do
              if [[ "${existing_asset}" == "${asset}" ]]; then
                expected=true
                break
              fi
            done
            if [[ "${expected}" != "true" ]]; then
              echo "Release contains an unexpected asset: ${existing_asset}" >&2
              exit 1
            fi
          done

          compare_dir=$(mktemp -d)
          trap 'rm -rf "${compare_dir}"' EXIT
          for existing_asset in "${existing_assets[@]}"; do
            gh release download "${RELEASE_TAG}" --pattern "${existing_asset}" --dir "${compare_dir}"
            if ! cmp -s "${existing_asset}" "${compare_dir}/${existing_asset}"; then
              echo "Refusing to replace existing release asset with different bytes: ${existing_asset}" >&2
              exit 1
            fi
          done

          for asset in "${release_assets[@]}"; do
            if ! printf '%s\n' "${existing_assets[@]}" | grep -Fxq -- "${asset}"; then
              if [[ "${is_draft}" != "true" ]]; then
                echo "Published release is missing required asset: ${asset}" >&2
                exit 1
              fi
              gh release upload "${RELEASE_TAG}" "${asset}"
            fi
          done

          release_json=$(gh release view "${RELEASE_TAG}" --json assets,isDraft,isPrerelease,tagName)
          current_is_draft=$(jq -r '.isDraft' <<<"${release_json}")
          if [[ "$(jq -r '.tagName' <<<"${release_json}")" != "${RELEASE_TAG}" ]] || \
             [[ "$(jq -r '.isPrerelease' <<<"${release_json}")" != "true" ]] || \
             [[ "${current_is_draft}" != "${is_draft}" ]]; then
            echo "Release identity or draft state changed during publication" >&2
            exit 1
          fi
          actual_asset_set=$(jq -r '.assets[].name' <<<"${release_json}" | LC_ALL=C sort)
          expected_asset_set=$(printf '%s\n' "${release_assets[@]}" | LC_ALL=C sort)
          if [[ "${actual_asset_set}" != "${expected_asset_set}" ]]; then
            echo "Release asset set does not exactly match the approved public asset set" >&2
            exit 1
          fi

          for asset in "${release_assets[@]}"; do
            if [[ ! -f "${compare_dir}/${asset}" ]]; then
              gh release download "${RELEASE_TAG}" --pattern "${asset}" --dir "${compare_dir}"
            fi
            if ! cmp -s "${asset}" "${compare_dir}/${asset}"; then
              echo "Refusing to replace existing release asset with different bytes: ${asset}" >&2
              exit 1
            fi
          done

          if [[ "${is_draft}" == "false" ]]; then
            echo "Published release assets are exact; leaving the release unchanged."
            exit 0
          fi

          gh release edit "${RELEASE_TAG}" \
            --draft=false \
            --prerelease \
            --title "${RELEASE_TAG}" \
            --notes-file release-notes.md

          final_json=$(gh release view "${RELEASE_TAG}" --json assets,isDraft,isPrerelease,tagName)
          if [[ "$(jq -r '.isDraft' <<<"${final_json}")" != "false" ]] || \
             [[ "$(jq -r '.isPrerelease' <<<"${final_json}")" != "true" ]] || \
             [[ "$(jq -r '.tagName' <<<"${final_json}")" != "${RELEASE_TAG}" ]]; then
            echo "GitHub prerelease did not reach the expected published state" >&2
            exit 1
          fi
