name: Build Standalone Candidate

on:
  workflow_dispatch:
    inputs:
      commit:
        description: 'Exact 40-character commit SHA on main to inspect before tagging'
        required: true
        type: string

permissions: {}

jobs:
  validate:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      CANDIDATE_COMMIT: ${{ inputs.commit }}
    steps:
      - name: Validate exact candidate commit
        shell: bash
        run: |
          if [[ ! "${CANDIDATE_COMMIT}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Candidate must be an exact lowercase 40-character commit SHA" >&2
            exit 1
          fi

      - name: Checkout exact candidate commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.CANDIDATE_COMMIT }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify candidate identity and main reachability
        shell: bash
        run: |
          test "$(git rev-parse HEAD)" = "${CANDIDATE_COMMIT}"
          test "$(git rev-parse refs/remotes/origin/main)" = "${CANDIDATE_COMMIT}"
          test "${GITHUB_SHA}" = "${CANDIDATE_COMMIT}"
          test "${GITHUB_REF}" = "refs/heads/main"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.23.1'
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check release security and build guardrails
        run: npm run check:release-security

  build-standalone:
    needs: validate
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-15
          - target: darwin-x64
            runner: macos-15-intel
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: linux-x64
            runner: ubuntu-24.04
          - target: windows-arm64
            runner: windows-11-arm
          - target: windows-x64
            runner: windows-2025
    runs-on: ${{ matrix.runner }}
    env:
      CANDIDATE_COMMIT: ${{ inputs.commit }}
      VOLT_REQUIRE_CLEAN_SOURCE: '1'
      VOLT_STANDALONE_TARGET: ${{ matrix.target }}
      VOLT_RUNNER_LABEL: ${{ matrix.runner }}
    steps:
      - name: Checkout exact candidate commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.CANDIDATE_COMMIT }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.23.1'
          package-manager-cache: false

      - name: Verify native matrix matches the compliance pin
        shell: bash
        run: |
          test "$(git rev-parse HEAD)" = "${CANDIDATE_COMMIT}"
          node -e 'const c=require("./compliance/standalone-runtime.json"); const t=c.targets[process.env.VOLT_STANDALONE_TARGET]; if(c.version!=="22.23.1" || !t || t.runner!==process.env.VOLT_RUNNER_LABEL) throw new Error("Standalone matrix does not match compliance/standalone-runtime.json")'

      - name: Install dependencies
        shell: bash
        run: npm ci --ignore-scripts

      - name: Build packages
        shell: bash
        run: npm run build

      - name: Build native standalone candidate
        shell: bash
        run: ./scripts/build-binaries.sh --skip-install --skip-build --platform "${VOLT_STANDALONE_TARGET}"

      - name: Upload native candidate archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: candidate-${{ matrix.target }}
          path: packages/coding-agent/binaries/volt-${{ matrix.target }}.${{ startsWith(matrix.target, 'windows-') && 'zip' || 'tar.gz' }}
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

  assemble:
    runs-on: ubuntu-24.04
    needs: build-standalone
    permissions:
      contents: read
    env:
      CANDIDATE_COMMIT: ${{ inputs.commit }}
    steps:
      - name: Download all native candidate archives
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: candidate-*
          path: standalone-candidate
          merge-multiple: true

      - name: Verify and checksum exact candidate set
        shell: bash
        run: |
          cd standalone-candidate
          release_assets=(
            volt-darwin-arm64.tar.gz
            volt-darwin-x64.tar.gz
            volt-linux-arm64.tar.gz
            volt-linux-x64.tar.gz
            volt-windows-arm64.zip
            volt-windows-x64.zip
          )
          for asset in "${release_assets[@]}"; do
            test -f "${asset}"
          done
          if [[ "$(find . -maxdepth 1 -type f -name 'volt-*' | wc -l | tr -d ' ')" != "6" ]]; then
            echo "Unexpected standalone candidate archive set" >&2
            exit 1
          fi
          LC_ALL=C sha256sum "${release_assets[@]}" > SHA256SUMS
          printf '%s\n' "${CANDIDATE_COMMIT}" > source-commit.txt
          sha256sum -c SHA256SUMS

      - name: Upload pre-tag compliance candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: standalone-candidate-${{ inputs.commit }}
          path: |
            standalone-candidate/volt-darwin-arm64.tar.gz
            standalone-candidate/volt-darwin-x64.tar.gz
            standalone-candidate/volt-linux-arm64.tar.gz
            standalone-candidate/volt-linux-x64.tar.gz
            standalone-candidate/volt-windows-arm64.zip
            standalone-candidate/volt-windows-x64.zip
            standalone-candidate/SHA256SUMS
            standalone-candidate/source-commit.txt
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
