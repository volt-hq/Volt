name: Build Standalone Candidate

on:
  workflow_dispatch:
    inputs:
      commit:
        description: 'Exact 40-character commit SHA on main to inspect before tagging'
        required: true
        type: string

permissions: {}

jobs:
  validate:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      CANDIDATE_COMMIT: ${{ inputs.commit }}
    steps:
      - name: Validate exact candidate commit
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          RUN_ACTOR: ${{ github.actor }}
          TRIGGERING_ACTOR: ${{ github.triggering_actor }}
        shell: bash
        run: |
          if [[ "${RUN_ACTOR}" != "${REPOSITORY_OWNER}" ]] || [[ "${TRIGGERING_ACTOR}" != "${REPOSITORY_OWNER}" ]]; then
            echo "Only the repository owner may build a release candidate" >&2
            exit 1
          fi
          if [[ ! "${CANDIDATE_COMMIT}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Candidate must be an exact lowercase 40-character commit SHA" >&2
            exit 1
          fi

      - name: Checkout exact candidate commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.CANDIDATE_COMMIT }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify candidate identity and main reachability
        shell: bash
        run: |
          test "$(git rev-parse HEAD)" = "${CANDIDATE_COMMIT}"
          test "$(git rev-parse refs/remotes/origin/main)" = "${CANDIDATE_COMMIT}"
          test "${GITHUB_SHA}" = "${CANDIDATE_COMMIT}"
          test "${GITHUB_REF}" = "refs/heads/main"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.23.1'
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check release security and build guardrails
        run: npm run check:release-security

  build-standalone:
    needs: validate
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-15
          - target: darwin-x64
            runner: macos-15-intel
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: linux-x64
            runner: ubuntu-24.04
          - target: windows-arm64
            runner: windows-11-arm
          - target: windows-x64
            runner: windows-2025
    runs-on: ${{ matrix.runner }}
    env:
      CANDIDATE_COMMIT: ${{ inputs.commit }}
      VOLT_REQUIRE_CLEAN_SOURCE: '1'
      VOLT_STANDALONE_TARGET: ${{ matrix.target }}
      VOLT_RUNNER_LABEL: ${{ matrix.runner }}
    steps:
      - name: Checkout exact candidate commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.CANDIDATE_COMMIT }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.23.1'
          package-manager-cache: false

      - name: Verify native matrix matches the compliance pin
        shell: bash
        run: |
          test "$(git rev-parse HEAD)" = "${CANDIDATE_COMMIT}"
          node -e 'const c=require("./compliance/standalone-runtime.json"); const t=c.targets[process.env.VOLT_STANDALONE_TARGET]; if(c.version!=="22.23.1" || !t || t.runner!==process.env.VOLT_RUNNER_LABEL) throw new Error("Standalone matrix does not match compliance/standalone-runtime.json")'

      - name: Install dependencies
        shell: bash
        run: npm ci --ignore-scripts

      - name: Build packages
        shell: bash
        run: npm run build

      - name: Build native standalone candidate
        shell: bash
        run: ./scripts/build-binaries.sh --skip-install --skip-build --platform "${VOLT_STANDALONE_TARGET}"

      - name: Upload native candidate archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: candidate-${{ matrix.target }}
          path: packages/coding-agent/binaries/volt-${{ matrix.target }}.${{ startsWith(matrix.target, 'windows-') && 'zip' || 'tar.gz' }}
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

  assemble:
    runs-on: ubuntu-24.04
    needs: build-standalone
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
    env:
      CANDIDATE_COMMIT: ${{ inputs.commit }}
      CANDIDATE_ARTIFACT_NAME: standalone-candidate-${{ inputs.commit }}
      STANDALONE_RUNTIME: node
      STANDALONE_RUNTIME_VERSION: '22.23.1'
    steps:
      - name: Download all native candidate archives
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: candidate-*
          path: standalone-candidate
          merge-multiple: true

      - name: Verify and checksum exact candidate set
        shell: bash
        run: |
          cd standalone-candidate
          release_assets=(
            volt-darwin-arm64.tar.gz
            volt-darwin-x64.tar.gz
            volt-linux-arm64.tar.gz
            volt-linux-x64.tar.gz
            volt-windows-arm64.zip
            volt-windows-x64.zip
          )
          for asset in "${release_assets[@]}"; do
            test -f "${asset}"
          done
          if [[ "$(find . -maxdepth 1 -type f -name 'volt-*' | wc -l | tr -d ' ')" != "6" ]]; then
            echo "Unexpected standalone candidate archive set" >&2
            exit 1
          fi
          LC_ALL=C sha256sum "${release_assets[@]}" > SHA256SUMS
          printf '%s\n' "${CANDIDATE_COMMIT}" > source-commit.txt
          sha256sum -c SHA256SUMS

      - name: Create candidate release record
        shell: bash
        run: |
          jq -Rn \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg workflow "${GITHUB_WORKFLOW}" \
            --arg workflow_path ".github/workflows/build-standalone-candidate.yml" \
            --arg run_id "${GITHUB_RUN_ID}" \
            --arg run_attempt "${GITHUB_RUN_ATTEMPT}" \
            --arg run_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --arg candidate_commit "${CANDIDATE_COMMIT}" \
            --arg candidate_ref "${GITHUB_REF}" \
            --arg artifact_name "${CANDIDATE_ARTIFACT_NAME}" \
            --arg runtime "${STANDALONE_RUNTIME}" \
            --arg runtime_version "${STANDALONE_RUNTIME_VERSION}" \
            '[inputs | capture("^(?<sha256>[0-9a-f]{64})  (?<name>.+)$")] as $archives |
            {
              schemaVersion: 1,
              repository: $repository,
              workflow: {
                name: $workflow,
                path: $workflow_path,
                runId: $run_id,
                runAttempt: $run_attempt,
                url: $run_url
              },
              candidate: {
                commit: $candidate_commit,
                ref: $candidate_ref
              },
              artifact: {
                name: $artifact_name,
                retentionDays: 30
              },
              runtime: {
                name: $runtime,
                version: $runtime_version
              },
              archives: $archives
            }' \
            < standalone-candidate/SHA256SUMS \
            > standalone-candidate/release-record.json

          jq -e \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg run_id "${GITHUB_RUN_ID}" \
            --arg candidate_commit "${CANDIDATE_COMMIT}" \
            --arg artifact_name "${CANDIDATE_ARTIFACT_NAME}" \
            '
              .schemaVersion == 1 and
              .repository == $repository and
              .workflow.path == ".github/workflows/build-standalone-candidate.yml" and
              .workflow.runId == $run_id and
              .candidate.commit == $candidate_commit and
              .candidate.ref == "refs/heads/main" and
              .artifact.name == $artifact_name and
              .runtime.name == "node" and
              .runtime.version == "22.23.1" and
              (.archives | length) == 6 and
              ([.archives[].name] | unique | length) == 6 and
              all(.archives[]; (.name | test("^volt-(darwin|linux|windows)-(arm64|x64)\\.(tar\\.gz|zip)$")) and (.sha256 | test("^[0-9a-f]{64}$")))
            ' \
            standalone-candidate/release-record.json \
            > /dev/null

          if [[ "$(find standalone-candidate -mindepth 1 -maxdepth 1 -type f | wc -l | tr -d ' ')" != "9" ]] || \
             [[ -n "$(find standalone-candidate -mindepth 1 -maxdepth 1 ! -type f -print -quit)" ]]; then
            echo "Candidate artifact contains an unexpected top-level entry" >&2
            exit 1
          fi

      - name: Attest native candidate archives
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-checksums: standalone-candidate/SHA256SUMS

      - name: Attest candidate release record
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: standalone-candidate/release-record.json

      - name: Upload pre-tag compliance candidate
        id: upload-candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.CANDIDATE_ARTIFACT_NAME }}
          path: |
            standalone-candidate/volt-darwin-arm64.tar.gz
            standalone-candidate/volt-darwin-x64.tar.gz
            standalone-candidate/volt-linux-arm64.tar.gz
            standalone-candidate/volt-linux-x64.tar.gz
            standalone-candidate/volt-windows-arm64.zip
            standalone-candidate/volt-windows-x64.zip
            standalone-candidate/SHA256SUMS
            standalone-candidate/source-commit.txt
            standalone-candidate/release-record.json
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Summarize candidate artifact
        env:
          CANDIDATE_ARTIFACT_DIGEST_RAW: ${{ steps.upload-candidate.outputs.artifact-digest }}
          CANDIDATE_ARTIFACT_ID: ${{ steps.upload-candidate.outputs.artifact-id }}
          CANDIDATE_ARTIFACT_URL: ${{ steps.upload-candidate.outputs.artifact-url }}
        shell: bash
        run: |
          if [[ ! "${CANDIDATE_ARTIFACT_ID}" =~ ^[0-9]+$ ]]; then
            echo "Candidate artifact ID is missing or malformed" >&2
            exit 1
          fi
          if [[ "${CANDIDATE_ARTIFACT_DIGEST_RAW}" =~ ^[0-9a-f]{64}$ ]]; then
            candidate_artifact_digest="sha256:${CANDIDATE_ARTIFACT_DIGEST_RAW}"
          elif [[ "${CANDIDATE_ARTIFACT_DIGEST_RAW}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            candidate_artifact_digest="${CANDIDATE_ARTIFACT_DIGEST_RAW}"
          else
            echo "Candidate artifact digest is missing or malformed" >&2
            exit 1
          fi
          {
            echo '## Standalone release candidate'
            echo
            echo '| Field | Value |'
            echo '| --- | --- |'
            printf '| Candidate SHA | `%s` |\n' "${CANDIDATE_COMMIT}"
            printf '| Workflow run ID | `%s` |\n' "${GITHUB_RUN_ID}"
            printf '| Artifact name | `%s` |\n' "${CANDIDATE_ARTIFACT_NAME}"
            printf '| Artifact ID | `%s` |\n' "${CANDIDATE_ARTIFACT_ID}"
            printf '| Artifact digest | `%s` |\n' "${candidate_artifact_digest}"
            printf '| Artifact | [Open artifact](%s) |\n' "${CANDIDATE_ARTIFACT_URL}"
          } >> "${GITHUB_STEP_SUMMARY}"
