services:
  main:
    depends_on:
      volt-bench-gateway-proxy:
        condition: service_started

  volt-bench-gateway-proxy:
    image: haproxy:3.2.1-alpine@sha256:ac79fe145f2bb6626ff26b584a2d0a34e791906c01015f2ae037aa3137b683d9
    command:
      - sh
      - -ec
      - |
        cat >/tmp/haproxy.cfg <<'EOF'
        global
          log stdout format raw local0
        defaults
          mode tcp
          timeout connect 10s
          timeout client 1h
          timeout server 1h
        frontend gateway
          bind *:4000
          default_backend litellm
        backend litellm
          server gateway volt-bench-gateway:4000 check
        EOF
        exec haproxy -f /tmp/haproxy.cfg
    networks:
      - default
      - volt_bench_gateway

networks:
  volt_bench_gateway:
    external: true
    name: ${PILOT_GATEWAY_NETWORK:?required}
