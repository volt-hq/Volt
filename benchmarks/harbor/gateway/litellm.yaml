model_list:
  - model_name: pilot-model
    litellm_params:
      model: anthropic/claude-sonnet-4-5-20250929
      api_key: os.environ/UPSTREAM_ANTHROPIC_API_KEY
      num_retries: 0
  - model_name: openai/pilot-model
    litellm_params:
      model: anthropic/claude-sonnet-4-5-20250929
      api_key: os.environ/UPSTREAM_ANTHROPIC_API_KEY
      num_retries: 0

router_settings:
  num_retries: 0

# Keep this host-only. Agents receive separately generated, scoped virtual keys.
general_settings:
  master_key: os.environ/PILOT_GATEWAY_MASTER_KEY
  database_url: os.environ/DATABASE_URL

litellm_settings:
  drop_params: false
  request_timeout: 900
