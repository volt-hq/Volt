\* TLC configuration for RelayViewer.tla
\*   ./check.sh RelayViewer
\* Models the daemon relay-token lifecycle (relay-stream.ts) and the drain
\* viewer-feed lifecycle (viewer-feed.ts). Baseline: all invariants + properties.

SPECIFICATION Spec

CONSTANTS
    Relays = {r1, r2}
    Feeds  = {f1, f2}
    Conns  = {c1, c2}
    NoConn = NoConn

INVARIANT
    RVTypeOK
    FeedOwnerSet
    BufferCoherent
    RelayUsedCoherent

PROPERTY
    NoEmitAfterEnd
    EndedIsTerminal
    SeqMonotone
    RelayNoResurrect
    FeedConverges
    RelaySettleConverges
