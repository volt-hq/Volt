\* TLC configuration for ClientAuth.tla
\*   ./check.sh ClientAuth
\* Checks the host authorization decision (authorization.ts) never admits a phone
\* that should be blocked, across all interleavings of pair/revoke/approve/expire
\* and a clock that can move backwards.

SPECIFICATION Spec

CONSTANTS
    Nodes = {n1, n2}
    NONE = NONE

INVARIANT
    CATypeOK
    NoIllegitimatePairing
    WorkspacePerRequest
