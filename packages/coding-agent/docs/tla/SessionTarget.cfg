\* TLC configuration for SessionTarget.tla
\*   ./check.sh SessionTarget
\* Checks that the daemon session-target producer and the phone selection
\* validator agree, and that the phone never commits a ghost / wrong-id pin.

SPECIFICATION Spec

INVARIANT
    STTypeOK
    NoGhostSession
    CanonicalPinOnly
    ProducerSubsetOfValidator
    RekeyWellFormed
    SessionResumedMatches
    RequestedOnlyForRekey

PROPERTY
    HandshakeTerminates
