\* TLC configuration for LeaseBroker.tla
\*
\* Run (once a JDK 17+ and tla2tools.jar are installed):
\*   java -XX:+UseParallelGC -jar tla2tools.jar -workers auto \
\*        -config LeaseBroker.cfg LeaseBroker.tla
\*
\* This is the GREEN BASELINE. It proves the ownership + hand-off invariants, the
\* stream-count-leak guard (NoStreamLeak, now that lease-broker.ts is fixed), and
\* the two liveness properties.
\*
\* One predicate stays OFF -- it documents INTENDED behavior (decided), not a bug:
\*   IdleAcquireOnlyWhenIdle -- a detached runtime's in-flight turn is abandoned on
\*   TUI acquire (RFC §4.2). Add it under INVARIANT to see the trace of that path.

SPECIFICATION Spec

CONSTANTS
    Keys = {k1, k2}
    TUIs = {t1, t2}
    MaxStreams = 2
    NoTUI = NoTUI

\* Keys and TUIs are interchangeable, but SYMMETRY is unsound with liveness
\* (PROPERTY) checks in TLC, so it is left off here.  For an INVARIANT-only,
\* faster run, delete the PROPERTY block below and uncomment:
\* SYMMETRY Symmetry

INVARIANT
    TypeOK
    OwnershipUnique
    RuntimeIffDaemon
    TuiOwnerWellFormed
    DisposePendingOnlyTui
    RelaysOnlyWhenTui
    DrainHasAcquirer
    StreamingCoherent
    DrainNoNewTurn
    NoStreamLeak
\*  IdleAcquireOnlyWhenIdle  \* <-- documents intended detached-turn abandonment (RFC §4.2); not a bug

PROPERTY
    DrainConverges
    EventualSettle
