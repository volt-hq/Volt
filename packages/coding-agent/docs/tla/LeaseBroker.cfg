\* TLC configuration for LeaseBroker.tla
\*
\* Run (once a JDK 17+ and tla2tools.jar are installed):
\*   java -XX:+UseParallelGC -jar tla2tools.jar -workers auto \
\*        -config LeaseBroker.cfg LeaseBroker.tla
\*
\* This is the GREEN BASELINE (verified with TLC 1.8.0 / Temurin JDK 17:
\* 40,804 distinct states, depth 27, "No error has been found").  It proves the
\* ownership + hand-off invariants and the two liveness properties.
\*
\* Two off-by-default detectors, each of which TLC turns into a concrete trace:
\*   NoStreamLeak            -- the stream-count leak bug (lease-broker.ts ~L399)
\*   IdleAcquireOnlyWhenIdle -- the detached-mid-turn dispose design gap
\* Add either under INVARIANT below and re-run to see its counterexample.

SPECIFICATION Spec

CONSTANTS
    Keys = {k1, k2}
    TUIs = {t1, t2}
    MaxStreams = 2
    NoTUI = NoTUI

\* Keys and TUIs are interchangeable, but SYMMETRY is unsound with liveness
\* (PROPERTY) checks in TLC, so it is left off here.  For an INVARIANT-only,
\* faster run, delete the PROPERTY block below and uncomment:
\* SYMMETRY Symmetry

INVARIANT
    TypeOK
    OwnershipUnique
    RuntimeIffDaemon
    TuiOwnerWellFormed
    DisposePendingOnlyTui
    RelaysOnlyWhenTui
    DrainHasAcquirer
    StreamingCoherent
    DrainNoNewTurn
\*  NoStreamLeak             \* <-- uncomment to reproduce the lease-broker.ts ~L399 leak
\*  IdleAcquireOnlyWhenIdle  \* <-- uncomment to reproduce the detached-mid-turn dispose gap

PROPERTY
    DrainConverges
    EventualSettle
