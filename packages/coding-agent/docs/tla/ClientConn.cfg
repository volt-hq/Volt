\* TLC configuration for ClientConn.tla
\*   ./check.sh ClientConn
\* Checks the phone's reconnect behavior: at most one concurrent dial, no auto-
\* reconnect while the user disconnected, terminal is absorbing, abort keeps the
\* stream live.

SPECIFICATION Spec

INVARIANT
    CCTypeOK
    SingleReconnectDial
    UserDiscSuppresses
    NoIllegalReconnect
    TerminalAbsorbing
    AbortKeepsLive
    DialImpliesLoop
